<!DOCTYPE html>
<html lang="en">
<head>
<title>Neon Casino - Withdraw</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ff00ff, #000020 60%, #000000);
    color: white;
    text-align: center;
    padding: 20px;
  }

  h1 {
    font-size: 38px;
    margin-top: 10px;
    text-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffea;
    font-weight: bold;
  }
  h1 span:nth-child(1) { color: #ffea00; }
  h1 span:nth-child(2) { color: #00ffea; }
  h1 span:nth-child(3) { color: #ff00ff; }

  .balance-box {
    margin-top: 15px;
    font-size: 26px;
    font-weight: bold;
    color: #ffea00;
    text-shadow: 0 0 12px #ffea00;
  }

  .card {
    margin: 30px auto;
    max-width: 400px;
    background: #000010;
    border-radius: 18px;
    border: 3px solid #ff00ff;
    box-shadow: 0 0 30px #ff00ff, 0 0 40px #00ffea;
    padding: 20px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-size: 18px;
    color: #00ffea;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 18px;
    margin-bottom: 15px;
    text-align: center;
  }

  .btn {
    padding: 12px 20px;
    font-size: 20px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    box-shadow: 0 0 20px #ff00ff;
    margin: 5px;
  }

  .btn:hover {
    transform: scale(1.05);
    filter: brightness(1.15);
  }

  #message {
    margin-top: 15px;
    font-size: 18px;
    text-shadow: 0 0 10px #ffea00;
  }
</style>
</head>

<body>

<h1>
  <span>NEON</span> <span>CASH</span> <span>WITHDRAW</span>
</h1>

<div class="balance-box">
  Current Balance: <span id="balance">0</span>
</div>

<div class="card">
  <label for="amount">Withdraw amount</label>
  <input type="number" id="amount" min="1" placeholder="Enter amount">

  <button class="btn" onclick="quickWithdraw(100)">-100</button>
  <button class="btn" onclick="quickWithdraw(500)">-500</button>
  <button class="btn" onclick="quickWithdraw(1000)">-1000</button>

  <br><br>
  <button class="btn" onclick="withdraw()">Confirm Withdraw</button>
</div>

<p id="message"></p>

<button class="btn" onclick="location.href='index.html'">⬅ Back to Menu</button>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDsK3umDd8f2ujLAjIZkv10mtvFNkCs2fA",
  authDomain: "norman-casino.firebaseapp.com",
  projectId: "norman-casino",
  storageBucket: "norman-casino.firebasestorage.app",
  messagingSenderId: "727231313437",
  appId: "1:727231313437:web:f0e60b94cf8f97cb30f8f4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let currentUser = null;
let balance = 0;

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }
  currentUser = user;
  await loadBalance();
});

async function loadBalance() {
  const docRef = db.collection("users").doc(currentUser.uid);
  const snap = await docRef.get();
  if (!snap.exists) {
    await docRef.set({ balance: 0 });
    balance = 0;
  } else {
    balance = snap.data().balance || 0;
  }
  document.getElementById("balance").textContent = balance;
}

function quickWithdraw(amount) {
  const input = document.getElementById("amount");
  input.value = (Number(input.value) || 0) + amount;
}

async function withdraw() {
  const msg = document.getElementById("message");
  const input = document.getElementById("amount");
  const amount = Number(input.value);

  if (!amount || amount <= 0) {
    msg.textContent = "Enter a valid amount.";
    return;
  }

  if (amount > balance) {
    msg.textContent = "Not enough balance.";
    return;
  }

  balance -= amount;
  await db.collection("users").doc(currentUser.uid).set(
    { balance: balance },
    { merge: true }
  );

  document.getElementById("balance").textContent = balance;
  msg.textContent = "✅ Withdraw successful!";
  input.value = "";
}
</script>

</body>
</html>
