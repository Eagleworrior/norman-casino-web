<!DOCTYPE html>
<html lang="en">
<head>
<title>Neon Casino - Deposit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ff00ff, #000020 60%, #000000);
    color: white;
    text-align: center;
    padding: 20px;
  }

  #top-balance-bar {
    width: 100%;
    padding: 12px 0;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 0 20px #ff00ff;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 99999;
  }
  #top-balance-label { color: #000010; text-shadow: 0 0 10px #ffffff; }
  #top-balance-value { color: #ffea00; text-shadow: 0 0 10px #ffea00; }

  body { padding-top: 80px; }

  h1 {
    font-size: 40px;
    margin-top: 20px;
    text-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffea;
    font-weight: bold;
  }
  h1 span:nth-child(1) { color: #ffea00; }
  h1 span:nth-child(2) { color: #00ffea; }
  h1 span:nth-child(3) { color: #ff00ff; }

  .card {
    margin: 30px auto;
    max-width: 400px;
    background: #050015;
    border-radius: 18px;
    border: 3px solid #ff00ff;
    box-shadow: 0 0 30px #ff00ff, 0 0 40px #00ffea;
    padding: 20px;
    text-align: left;
  }

  .step {
    margin-bottom: 15px;
    font-size: 20px;
    color: #ffea00;
    text-shadow: 0 0 10px #ffea00;
  }

  .btn {
    padding: 12px 20px;
    font-size: 20px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #00ffea, #ff00ff);
    color: #000010;
    box-shadow: 0 0 20px #ff00ff;
    margin-top: 20px;
  }
  .btn:hover { transform: scale(1.05); filter: brightness(1.15); }
</style>
</head>

<body>

<div id="top-balance-bar">
  <span id="top-balance-label">BALANCE:</span>
  <span id="top-balance-value">0</span>
</div>

<h1>
  <span>NEON</span> <span>CASH</span> <span>DEPOSIT</span>
</h1>

<div class="card">
  <div class="step">1️⃣ Go to M-PESA</div>
  <div class="step">2️⃣ Select *Lipa na M-PESA*</div>
  <div class="step">3️⃣ Choose *Paybill*</div>
  <div class="step">4️⃣ Enter Paybill Number: <b style="color:#00ffea;">880100</b></div>
  <div class="step">5️⃣ Enter Account Number: <b style="color:#00ffea;">1004508555</b></div>
  <div class="step">6️⃣ Enter Amount (Minimum Ksh 50)</div>
  <div class="step">7️⃣ Confirm and Send</div>
</div>

<button class="btn" onclick="location.href='index.html'">⬅ Back to Lobby</button>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDsK3umDd8f2ujLAjIZkv10mtvFNkCs2fA",
  authDomain: "norman-casino.firebaseapp.com",
  projectId: "norman-casino",
  storageBucket: "norman-casino.firebasestorage.app",
  messagingSenderId: "727231313437",
  appId: "1:727231313437:web:f0e60b94cf8f97cb30f8f4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let currentUser = null;
let globalBalance = 0;

auth.onAuthStateChanged(async (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }
  currentUser = user;
  await loadBalance();
});

async function loadBalance() {
  const docRef = db.collection("users").doc(currentUser.uid);
  const snap = await docRef.get();
  if (!snap.exists) {
    await docRef.set({ balance: 0 });
    globalBalance = 0;
  } else {
    globalBalance = snap.data().balance || 0;
  }
  document.getElementById("top-balance-value").textContent = globalBalance;
}
</script>

</body>
</html>
