<!DOCTYPE html>
<html lang="en">
<head>
<title>Norman Casino - Main Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ff00ff, #000020 60%, #000000);
    color: white;
    text-align: center;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    animation: fadeIn 1s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  h1 {
    font-size: 34px;
    margin-bottom: 20px;
    text-shadow: 0 0 12px #ff00ff, 0 0 20px #00ffea;
  }

  h1 span:nth-child(1) { color: #ffea00; }
  h1 span:nth-child(2) { color: #00ffea; }
  h1 span:nth-child(3) { color: #ff00ff; }

  .menu-btn {
    width: 80%;
    max-width: 320px;
    padding: 15px;
    margin: 12px auto;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #ffea00, #ff00ff);
    color: #000010;
    text-shadow: 0 0 4px rgba(0,0,0,0.7);
    box-shadow: 0 0 15px rgba(255,0,255,0.7), 0 0 25px rgba(0,255,255,0.4);
    transition: 0.2s ease-in-out;
  }

  .menu-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.15);
  }

  .logout {
    margin-top: 25px;
    font-size: 14px;
    color: #ff5555;
    cursor: pointer;
    text-decoration: underline;
  }

  .balance-box {
    margin-bottom: 20px;
    font-size: 18px;
    color: #00ffea;
    text-shadow: 0 0 8px #00ffea;
  }
</style>
</head>

<body>

<h1>
  <span>NORMAN</span> <span>CASINO</span> <span>MENU</span>
</h1>

<div class="balance-box" id="balanceBox">Loading balance...</div>

<button class="menu-btn" onclick="location.href='deposit.html'">💰 Deposit Dashboard</button>
<button class="menu-btn" onclick="location.href='withdraw.html'">🏧 Withdrawal Dashboard</button>
<button class="menu-btn" onclick="location.href='wheel.html'">🎡 Spinning Wheel</button>
<button class="menu-btn" onclick="location.href='slot.html'">🎰 Slot Machine</button>

<div class="logout" onclick="logoutUser()">Logout</div>

<script type="module">
  import { getAuth, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  import { getFirestore, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  import { logoutUser } from "./scripts/auth.js";

  const auth = getAuth();
  const db = getFirestore();

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      document.getElementById("balanceBox").textContent =
        "💎 Balance: $" + snap.data().balance;
    } else {
      document.getElementById("balanceBox").textContent =
        "Balance unavailable.";
    }
  });
</script>

</body>
</html>
