<!DOCTYPE html>
<html lang="en">
<head>
<title>Neon Casino Lobby</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #ff00ff, #000020 60%, #000000);
    color: white;
    text-align: center;
    padding: 20px;
  }

  /* TOP BALANCE BAR */
  #top-balance-bar {
    width: 100%;
    padding: 12px 0;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 0 20px #ff00ff;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 99999;
  }

  #top-balance-label {
    color: #000010;
    text-shadow: 0 0 10px #ffffff;
  }

  #top-balance-value {
    color: #ffea00;
    text-shadow: 0 0 10px #ffea00;
  }

  body {
    padding-top: 80px;
  }

  h1 {
    font-size: 45px;
    margin-top: 20px;
    text-shadow: 0 0 20px #ff00ff, 0 0 30px #00ffea;
    font-weight: bold;
  }

  h1 span:nth-child(1) { color: #ffea00; }
  h1 span:nth-child(2) { color: #00ffea; }
  h1 span:nth-child(3) { color: #ff00ff; }

  .menu {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 350px;
    margin-left: auto;
    margin-right: auto;
  }

  .menu-btn {
    padding: 18px;
    font-size: 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    box-shadow: 0 0 25px #ff00ff;
    transition: 0.2s;
  }

  .menu-btn:hover {
    transform: scale(1.07);
    filter: brightness(1.2);
  }

  #logout-btn {
    background: linear-gradient(90deg, #ff4444, #ff8800);
    box-shadow: 0 0 25px #ff4444;
  }
</style>
</head>

<body>

<!-- UNIVERSAL BALANCE BAR -->
<div id="top-balance-bar">
  <span id="top-balance-label">BALANCE:</span>
  <span id="top-balance-value">0</span>
</div>

<h1>
  <span>NEON</span> <span>CASINO</span> <span>LOBBY</span>
</h1>

<div class="menu">
  <button class="menu-btn" onclick="location.href='slot.html'">🎰 Slot Machine</button>
  <button class="menu-btn" onclick="location.href='wheel.html'">🎡 Wheel Spin</button>
  <button class="menu-btn" onclick="location.href='deposit.html'">💰 Deposit</button>
  <button class="menu-btn" onclick="location.href='withdraw.html'">💸 Withdraw</button>
  <button class="menu-btn" onclick="location.href='login.html'">🔐 Login</button>
  <button class="menu-btn" id="logout-btn" onclick="logout()">🚪 Logout</button>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDsK3umDd8f2ujLAjIZkv10mtvFNkCs2fA",
  authDomain: "norman-casino.firebaseapp.com",
  projectId: "norman-casino",
  storageBucket: "norman-casino.firebasestorage.app",
  messagingSenderId: "727231313437",
  appId: "1:727231313437:web:f0e60b94cf8f97cb30f8f4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let currentUser = null;
let globalBalance = 0;

/* LOAD BALANCE */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    document.getElementById("top-balance-value").textContent = "0";
    return;
  }
  currentUser = user;
  await loadGlobalBalance();
});

async function loadGlobalBalance() {
  const docRef = db.collection("users").doc(currentUser.uid);
  const snap = await docRef.get();

  if (!snap.exists) {
    await docRef.set({ balance: 0 });
    globalBalance = 0;
  } else {
    globalBalance = snap.data().balance || 0;
  }

  document.getElementById("top-balance-value").textContent = globalBalance;
}

async function logout() {
  await auth.signOut();
  location.href = "login.html";
}
</script>

</body>
</html>
