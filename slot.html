<!DOCTYPE html>
<html lang="en">
<head>
<title>Neon Turbo Slot Machine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ff00ff, #000020 60%, #000000);
    color: white;
    text-align: center;
    padding: 20px;
    animation: fadeIn 1s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  h1 {
    font-size: 38px;
    margin-top: 10px;
    text-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffea;
    font-weight: bold;
  }

  h1 span:nth-child(1) { color: #ffea00; }
  h1 span:nth-child(2) { color: #00ffea; }
  h1 span:nth-child(3) { color: #ff00ff; }

  #mode {
    margin-top: 15px;
    padding: 10px 15px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #000010;
    color: #00ffea;
    box-shadow: 0 0 12px #00ffea;
  }

  .balance-box {
    margin-top: 15px;
    font-size: 26px;
    font-weight: bold;
    color: #ffea00;
    text-shadow: 0 0 12px #ffea00;
  }

  #slot-frame {
    width: 420px;
    height: 240px;
    margin: 30px auto;
    background: #000010;
    border: 6px solid #ff00ff;
    border-radius: 20px;
    box-shadow: 0 0 35px #ff00ff, 0 0 45px #00ffea;
    display: flex;
    justify-content: space-around;
    align-items: center;
    overflow: hidden;
  }

  .reel {
    width: 120px;
    height: 240px;
    overflow: hidden;
    border-radius: 12px;
    border: 3px solid #00ffea;
    background: black;
    position: relative;
    box-shadow: 0 0 15px #00ffea;
  }

  .reel-strip {
    position: absolute;
    width: 100%;
    top: 0;
  }

  .fruit {
    font-size: 60px;
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .spin-btn {
    padding: 15px 25px;
    font-size: 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    box-shadow: 0 0 20px #ff00ff;
    transition: 0.2s;
  }

  .spin-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
  }

  #result {
    margin-top: 20px;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 0 12px #ffea00;
  }

  .back-btn {
    margin-top: 25px;
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #00ffea, #ff00ff);
    color: #000010;
    box-shadow: 0 0 15px #ff00ff;
    transition: 0.2s;
  }

  .back-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.15);
  }
</style>
</head>

<body>

<h1>
  <span>NEON</span> <span>TURBO</span> <span>SLOTS</span>
</h1>

<select id="mode" onchange="updateBalanceDisplay()">
  <option value="demo">Demo Mode</option>
  <option value="real">Real Mode</option>
</select>

<div class="balance-box">
  Balance: <span id="balance">0</span>
</div>

<div id="slot-frame">
  <div class="reel"><div class="reel-strip" id="strip1"></div></div>
  <div class="reel"><div class="reel-strip" id="strip2"></div></div>
  <div class="reel"><div class="reel-strip" id="strip3"></div></div>
</div>

<button class="spin-btn" onclick="spin()">SPIN (Cost: 20)</button>

<p id="result"></p>

<button class="back-btn" onclick="location.href='index.html'">⬅ Back to Menu</button>

<!-- FIREBASE SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
// TODO: replace with your real Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "norman-casino.firebaseapp.com",
  projectId: "norman-casino",
  storageBucket: "norman-casino.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
</script>

<!-- CONFETTI -->
<script>
function launchConfetti() {
  const duration = 1500;
  const end = Date.now() + duration;

  (function frame() {
    const colors = ["#ff00ff", "#00ffea", "#ffea00", "#ffffff"];
    const particle = document.createElement("div");

    particle.style.position = "fixed";
    particle.style.width = "10px";
    particle.style.height = "10px";
    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    particle.style.top = Math.random() * window.innerHeight + "px";
    particle.style.left = Math.random() * window.innerWidth + "px";
    particle.style.opacity = "0.9";
    particle.style.borderRadius = "50%";
    particle.style.boxShadow = "0 0 10px white";
    particle.style.zIndex = "9999";
    particle.style.transition = "transform 1s ease-out, opacity 1s ease-out";

    document.body.appendChild(particle);

    setTimeout(() => {
      particle.style.transform = "translateY(200px) rotate(720deg)";
      particle.style.opacity = "0";
    }, 10);

    setTimeout(() => particle.remove(), 1200);

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}
</script>

<script>
let demoBalance = 10000;
let realBalance = 0;   // from Firebase
let currentUser = null;

/* 100+ FRUITS & SYMBOLS */
const fruits = [];
const base = ["🍒","🍋","🍉","⭐","💎","7️⃣","🍇","🍍","🥝","🍊","🍓","🔔","🍈","🥥","🍏","🍐","🍑"];
for (let i = 0; i < 7; i++) {
  fruits.push(...base);
}

/* LOAD REELS */
function loadReels() {
  for (let i = 1; i <= 3; i++) {
    let strip = document.getElementById("strip" + i);
    strip.innerHTML = "";
    fruits.forEach(f => {
      strip.innerHTML += `<div class='fruit'>${f}</div>`;
    });
  }
}
loadReels();

/* FIRESTORE BALANCE HELPERS */
async function getRealBalance() {
  if (!currentUser) return 0;
  const docRef = db.collection("users").doc(currentUser.uid);
  const snap = await docRef.get();
  if (!snap.exists) {
    await docRef.set({ balance: 0 });
    return 0;
  }
  return snap.data().balance || 0;
}

async function setRealBalance(amount) {
  if (!currentUser) return;
  await db.collection("users").doc(currentUser.uid).set(
    { balance: amount },
    { merge: true }
  );
}

/* AUTH STATE */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    // redirect to login if not logged in
    window.location.href = "login.html";
    return;
  }
  currentUser = user;
  realBalance = await getRealBalance();
  updateBalanceDisplay();
});

/* UPDATE BALANCE DISPLAY */
function updateBalanceDisplay() {
  const mode = document.getElementById("mode").value;
  const balSpan = document.getElementById("balance");
  if (mode === "demo") {
    balSpan.textContent = demoBalance;
  } else {
    balSpan.textContent = realBalance;
  }
}

/* SUPER FAST SPINNING SLOT MACHINE */
async function spin() {
  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  if (mode === "demo") {
    if (demoBalance < 20) {
      result.textContent = "Not enough demo credits.";
      return;
    }
    demoBalance -= 20;
  } else {
    // REAL MODE
    realBalance = await getRealBalance();
    if (realBalance < 20) {
      result.textContent = "You must deposit first!";
      return;
    }
    realBalance -= 20;
    await setRealBalance(realBalance);
  }

  updateBalanceDisplay();
  result.textContent = "⚡ Spinning at high speed...";

  const strips = [
    document.getElementById("strip1"),
    document.getElementById("strip2"),
    document.getElementById("strip3")
  ];

  strips.forEach(strip => strip.style.transition = "none");

  const spinIntervals = [];

  strips.forEach((strip, index) => {
    spinIntervals[index] = setInterval(() => {
      const rand = Math.floor(Math.random() * fruits.length);
      strip.style.top = -(rand * 80) + "px";
    }, 30);
  });

  setTimeout(async () => {
    strips.forEach((strip, index) => clearInterval(spinIntervals[index]));
    strips.forEach(strip => strip.style.transition = "top 0.25s ease-out");

    const pos1 = Math.floor(Math.random() * fruits.length);
    const pos2 = Math.floor(Math.random() * fruits.length);
    const pos3 = Math.floor(Math.random() * fruits.length);

    strip1.style.top = -(pos1 * 80) + "px";
    strip2.style.top = -(pos2 * 80) + "px";
    strip3.style.top = -(pos3 * 80) + "px";

    setTimeout(async () => {
      const f1 = fruits[pos1];
      const f2 = fruits[pos2];
      const f3 = fruits[pos3];

      if (f1 === f2 && f2 === f3) {
        const winAmount = 500;
        result.textContent = "💥 MEGA WIN! You win: " + winAmount + " 💥";
        launchConfetti();

        if (mode === "demo") {
          demoBalance += winAmount;
        } else {
          realBalance += winAmount;
          await setRealBalance(realBalance);
        }
      } else {
        result.textContent = "Try again!";
      }

      updateBalanceDisplay();
    }, 250);

  }, 1200);
}
</script>

</body>
</html>
