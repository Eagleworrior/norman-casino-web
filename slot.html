<!DOCTYPE html>
<html lang="en">
<head>
<title>Neon Turbo Slot Machine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ff00ff, #000020 60%, #000000);
    color: white;
    text-align: center;
    padding: 20px;
    animation: fadeIn 1s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  h1 {
    font-size: 38px;
    margin-top: 10px;
    text-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffea;
    font-weight: bold;
  }

  h1 span:nth-child(1) { color: #ffea00; }
  h1 span:nth-child(2) { color: #00ffea; }
  h1 span:nth-child(3) { color: #ff00ff; }

  #mode {
    margin-top: 15px;
    padding: 10px 15px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #000010;
    color: #00ffea;
    box-shadow: 0 0 12px #00ffea;
  }

  .balance-box {
    margin-top: 15px;
    font-size: 26px;
    font-weight: bold;
    color: #ffea00;
    text-shadow: 0 0 12px #ffea00;
  }

  #slot-frame {
    width: 420px;
    height: 240px;
    margin: 30px auto;
    background: #000010;
    border: 6px solid #ff00ff;
    border-radius: 20px;
    box-shadow: 0 0 35px #ff00ff, 0 0 45px #00ffea;
    display: flex;
    justify-content: space-around;
    align-items: center;
    overflow: hidden;
  }

  .reel {
    width: 120px;
    height: 240px;
    overflow: hidden;
    border-radius: 12px;
    border: 3px solid #00ffea;
    background: black;
    position: relative;
    box-shadow: 0 0 15px #00ffea;
  }

  .reel-strip {
    position: absolute;
    width: 100%;
    top: 0;
    transition: top 0.15s linear; /* SUPER FAST */
  }

  .fruit {
    font-size: 60px;
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .spin-btn {
    padding: 15px 25px;
    font-size: 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    box-shadow: 0 0 20px #ff00ff;
    transition: 0.2s;
  }

  .spin-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
  }

  #result {
    margin-top: 20px;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 0 12px #ffea00;
  }

  .back-btn {
    margin-top: 25px;
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #00ffea, #ff00ff);
    color: #000010;
    box-shadow: 0 0 15px #ff00ff;
    transition: 0.2s;
  }

  .back-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.15);
  }
</style>
</head>

<body>

<h1>
  <span>NEON</span> <span>TURBO</span> <span>SLOTS</span>
</h1>

<select id="mode" onchange="updateBalanceDisplay()">
  <option value="demo">Demo Mode</option>
  <option value="real">Real Mode</option>
</select>

<div class="balance-box">
  Balance: <span id="balance">10000</span>
</div>

<div id="slot-frame">
  <div class="reel"><div class="reel-strip" id="strip1"></div></div>
  <div class="reel"><div class="reel-strip" id="strip2"></div></div>
  <div class="reel"><div class="reel-strip" id="strip3"></div></div>
</div>

<button class="spin-btn" onclick="spin()">SPIN (Cost: 20)</button>

<p id="result"></p>

<button class="back-btn" onclick="location.href='index.html'">⬅ Back to Menu</button>

<script>
let demoBalance = 10000;
let realBalance = 0;

/* 100+ FRUITS & SYMBOLS */
const fruits = [];
const base = ["🍒","🍋","🍉","⭐","💎","7️⃣","🍇","🍍","🥝","🍊","🍓","🔔","🍈","🥥","🍏","🍐","🍑","🍭","🍬","🎲","🎯","🧨","🎁","🪙"];

for (let i = 0; i < 5; i++) {
  fruits.push(...base); // duplicate 5 times = 120+ symbols
}

function loadReels() {
  for (let i = 1; i <= 3; i++) {
    let strip = document.getElementById("strip" + i);
    strip.innerHTML = "";
    fruits.forEach(f => {
      strip.innerHTML += `<div class='fruit'>${f}</div>`;
    });
  }
}
loadReels();

function updateBalanceDisplay() {
  let mode = document.getElementById("mode").value;
  document.getElementById("balance").textContent =
    mode === "demo" ? demoBalance : realBalance;
}

function spin() {
  let mode = document.getElementById("mode").value;
  let result = document.getElementById("result");

  let balance = mode === "demo" ? demoBalance : realBalance;

  if (balance < 20) {
    if (mode === "real") {
      result.textContent = "You must deposit first!";
      setTimeout(() => location.href = "deposit.html", 1000);
    } else {
      result.textContent = "Not enough demo credits.";
    }
    return;
  }

  if (mode === "demo") demoBalance -= 20;
  else realBalance -= 20;

  updateBalanceDisplay();
  result.textContent = "⚡ Spinning at light speed...";

  let pos1 = Math.floor(Math.random() * fruits.length);
  let pos2 = Math.floor(Math.random() * fruits.length);
  let pos3 = Math.floor(Math.random() * fruits.length);

  document.getElementById("strip1").style.top = -(pos1 * 80) + "px";
  document.getElementById("strip2").style.top = -(pos2 * 80) + "px";
  document.getElementById("strip3").style.top = -(pos3 * 80) + "px";

  setTimeout(() => {
    let f1 = fruits[pos1];
    let f2 = fruits[pos2];
    let f3 = fruits[pos3];

    if (f1 === f2 && f2 === f3) {
      let winAmount = 500;
      result.textContent = "💥 MEGA WIN! You win: " + winAmount + " 💥";

      if (mode === "demo") demoBalance += winAmount;
      else realBalance += winAmount;
    } else {
      result.textContent = "Try again!";
    }

    updateBalanceDisplay();
  }, 150);
}

updateBalanceDisplay();
</script>

</body>
</html>
