<!DOCTYPE html>
<html lang="en">
<head>
<title>Neon Turbo Slot Machine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ff00ff, #000020 60%, #000000);
    color: white;
    text-align: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* TOP BALANCE BAR */
  #top-balance-bar {
    width: 100%;
    padding: 12px 0;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 0 20px #ff00ff;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 99999;
  }
  #top-balance-label { color: #000010; text-shadow: 0 0 10px #ffffff; }
  #top-balance-value { color: #ffea00; text-shadow: 0 0 10px #ffea00; }

  body { padding-top: 80px; }

  h1 {
    font-size: 38px;
    margin-top: 10px;
    text-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffea;
    font-weight: bold;
  }
  h1 span:nth-child(1) { color: #ffea00; }
  h1 span:nth-child(2) { color: #00ffea; }
  h1 span:nth-child(3) { color: #ff00ff; }

  #mode {
    margin-top: 15px;
    padding: 10px 15px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #000010;
    color: #00ffea;
    box-shadow: 0 0 12px #00ffea;
  }

  .balance-box {
    margin-top: 15px;
    font-size: 22px;
    font-weight: bold;
    color: #ffea00;
    text-shadow: 0 0 12px #ffea00;
  }

  #slot-frame {
    width: 420px;
    height: 240px;
    margin: 30px auto;
    background: #000010;
    border: 6px solid #ff00ff;
    border-radius: 20px;
    box-shadow: 0 0 35px #ff00ff, 0 0 45px #00ffea;
    display: flex;
    justify-content: space-around;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .reel {
    width: 120px;
    height: 240px;
    overflow: hidden;
    border-radius: 12px;
    border: 3px solid #00ffea;
    background: black;
    position: relative;
    box-shadow: 0 0 15px #00ffea;
  }

  .reel-strip {
    position: absolute;
    width: 100%;
    top: 0;
  }

  .fruit {
    font-size: 60px;
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .spin-btn {
    padding: 15px 25px;
    font-size: 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    box-shadow: 0 0 20px #ff00ff;
    transition: 0.2s;
  }
  .spin-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

  #result {
    margin-top: 20px;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 0 12px #ffea00;
  }

  .back-btn {
    margin-top: 25px;
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #00ffea, #ff00ff);
    color: #000010;
    box-shadow: 0 0 15px #ff00ff;
    transition: 0.2s;
  }
  .back-btn:hover { transform: scale(1.05); filter: brightness(1.15); }

  /* FLAMES */
  #left-flame, #right-flame {
    position: fixed;
    bottom: 0;
    width: 120px;
    height: 220px;
    pointer-events: none;
    z-index: 10;
  }
  #left-flame {
    left: 0;
    background: radial-gradient(circle at top, #00ff00, transparent 60%);
    filter: blur(4px) drop-shadow(0 0 25px #00ff00);
    animation: flameLeft 1.8s infinite ease-in-out;
  }
  #right-flame {
    right: 0;
    background: radial-gradient(circle at top, #b000ff, transparent 60%);
    filter: blur(4px) drop-shadow(0 0 25px #b000ff);
    animation: flameRight 1.8s infinite ease-in-out;
  }
  @keyframes flameLeft {
    0%,100% { transform: translateY(0) scaleY(1); opacity: 0.8; }
    50% { transform: translateY(-20px) scaleY(1.2); opacity: 1; }
  }
  @keyframes flameRight {
    0%,100% { transform: translateY(0) scaleY(1); opacity: 0.8; }
    50% { transform: translateY(-25px) scaleY(1.25); opacity: 1; }
  }
</style>
</head>

<body>

<div id="left-flame"></div>
<div id="right-flame"></div>

<div id="top-balance-bar">
  <span id="top-balance-label">BALANCE:</span>
  <span id="top-balance-value">0</span>
</div>

<h1>
  <span>NEON</span> <span>TURBO</span> <span>SLOTS</span>
</h1>

<select id="mode" onchange="updateBalanceDisplay()">
  <option value="demo">Demo Mode</option>
  <option value="real">Real Mode</option>
</select>

<div class="balance-box">
  Game Balance: <span id="balance">0</span>
</div>

<div id="slot-frame">
  <div class="reel"><div class="reel-strip" id="strip1"></div></div>
  <div class="reel"><div class="reel-strip" id="strip2"></div></div>
  <div class="reel"><div class="reel-strip" id="strip3"></div></div>
</div>

<button class="spin-btn" onclick="spin()">SPIN (Cost: 20)</button>

<p id="result"></p>

<button class="back-btn" onclick="location.href='index.html'">⬅ Back to Lobby</button>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDsK3umDd8f2ujLAjIZkv10mtvFNkCs2fA",
  authDomain: "norman-casino.firebaseapp.com",
  projectId: "norman-casino",
  storageBucket: "norman-casino.firebasestorage.app",
  messagingSenderId: "727231313437",
  appId: "1:727231313437:web:f0e60b94cf8f97cb30f8f4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

let currentUser = null;
let globalBalance = 0;
let demoBalance = 10000;
let realBalance = 0;

/* SOUNDS */
const spinSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const winSound  = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const loseSound = new Audio("https://actions.google.com/sounds/v1/cartoon/metal_clank.ogg");

/* CONFETTI */
function launchConfetti() {
  const duration = 1500;
  const end = Date.now() + duration;

  (function frame() {
    const colors = ["#ff00ff", "#00ffea", "#ffea00", "#ffffff"];
    const particle = document.createElement("div");

    particle.style.position = "fixed";
    particle.style.width = "10px";
    particle.style.height = "10px";
    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    particle.style.top = Math.random() * window.innerHeight + "px";
    particle.style.left = Math.random() * window.innerWidth + "px";
    particle.style.opacity = "0.9";
    particle.style.borderRadius = "50%";
    particle.style.boxShadow = "0 0 10px white";
    particle.style.zIndex = "9999";
    particle.style.transition = "transform 1s ease-out, opacity 1s ease-out";

    document.body.appendChild(particle);

    setTimeout(() => {
      particle.style.transform = "translateY(200px) rotate(720deg)";
      particle.style.opacity = "0";
    }, 10);

    setTimeout(() => particle.remove(), 1200);

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}

/* FRUITS */
const fruits = [];
const base = ["🍒","🍋","🍉","⭐","💎","7️⃣","🍇","🍍","🥝","🍊","🍓","🔔","🍈","🥥","🍏","🍐","🍑"];
for (let i = 0; i < 7; i++) fruits.push(...base);

function loadReels() {
  for (let i = 1; i <= 3; i++) {
    let strip = document.getElementById("strip" + i);
    strip.innerHTML = "";
    fruits.forEach(f => {
      strip.innerHTML += `<div class='fruit'>${f}</div>`;
    });
  }
}
loadReels();

/* GLOBAL BALANCE HELPERS */
async function loadGlobalBalance() {
  const docRef = db.collection("users").doc(currentUser.uid);
  const snap = await docRef.get();
  if (!snap.exists) {
    await docRef.set({ balance: 0 });
    globalBalance = 0;
  } else {
    globalBalance = snap.data().balance || 0;
  }
  realBalance = globalBalance;
  document.getElementById("top-balance-value").textContent = globalBalance;
  updateBalanceDisplay();
}

async function updateGlobalBalance(newAmount) {
  globalBalance = newAmount;
  realBalance = newAmount;
  await db.collection("users").doc(currentUser.uid).set(
    { balance: globalBalance },
    { merge: true }
  );
  document.getElementById("top-balance-value").textContent = globalBalance;
  updateBalanceDisplay();
}

/* TRANSACTION LOG */
async function logTransaction(type, amount, extra = {}) {
  if (!currentUser) return;
  await db.collection("users")
          .doc(currentUser.uid)
          .collection("transactions")
          .add({
            type,
            amount,
            game: "slot",
            time: firebase.firestore.FieldValue.serverTimestamp(),
            ...extra
          });
}

/* AUTH */
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    await loadGlobalBalance();
  } else {
    setTimeout(() => {
      if (!auth.currentUser) location.href = "login.html";
    }, 500);
  }
});

/* UI BALANCE */
function updateBalanceDisplay() {
  const mode = document.getElementById("mode").value;
  const span = document.getElementById("balance");
  if (mode === "demo") span.textContent = demoBalance;
  else span.textContent = realBalance;
}

/* SPIN */
async function spin() {
  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  spinSound.currentTime = 0;
  spinSound.play();

  if (mode === "demo") {
    if (demoBalance < 20) {
      result.textContent = "Not enough demo credits.";
      return;
    }
    demoBalance -= 20;
  } else {
    if (!currentUser) {
      result.textContent = "Please login first.";
      return;
    }
    if (realBalance < 20) {
      result.textContent = "You must deposit first!";
      return;
    }
    realBalance -= 20;
    await updateGlobalBalance(realBalance);
    await logTransaction("slot_spin_cost", -20);
  }

  updateBalanceDisplay();
  result.textContent = "⚡ Spinning at high speed...";

  const strips = [
    document.getElementById("strip1"),
    document.getElementById("strip2"),
    document.getElementById("strip3")
  ];

  strips.forEach(strip => strip.style.transition = "none");

  const spinIntervals = [];
  strips.forEach((strip, index) => {
    spinIntervals[index] = setInterval(() => {
      const rand = Math.floor(Math.random() * fruits.length);
      strip.style.top = -(rand * 80) + "px";
    }, 30);
  });

  setTimeout(async () => {
    strips.forEach((strip, index) => clearInterval(spinIntervals[index]));
    strips.forEach(strip => strip.style.transition = "top 0.25s ease-out");

    const pos1 = Math.floor(Math.random() * fruits.length);
    const pos2 = Math.floor(Math.random() * fruits.length);
    const pos3 = Math.floor(Math.random() * fruits.length);

    strip1.style.top = -(pos1 * 80) + "px";
    strip2.style.top = -(pos2 * 80) + "px";
    strip3.style.top = -(pos3 * 80) + "px";

    setTimeout(async () => {
      const f1 = fruits[pos1];
      const f2 = fruits[pos2];
      const f3 = fruits[pos3];

      if (f1 === f2 && f2 === f3) {
        const winAmount = 500;
        result.textContent = "💥 MEGA WIN! You win: " + winAmount + " 💥";
        launchConfetti();
        winSound.currentTime = 0;
        winSound.play();

        if (mode === "demo") {
          demoBalance += winAmount;
        } else {
          realBalance += winAmount;
          await updateGlobalBalance(realBalance);
          await logTransaction("slot_win", winAmount, { combo: f1 + f2 + f3 });
        }
      } else {
        result.textContent = "Try again!";
        loseSound.currentTime = 0;
        loseSound.play();
      }

      updateBalanceDisplay();
    }, 250);

  }, 1200);
}
</script>

</body>
</html>
