<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Norman Casino - Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #ff00ff, #000020 60%, #000000);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: linear-gradient(145deg, #111111, #1f0033);
      border-radius: 18px;
      padding: 24px 26px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 0 25px rgba(255, 0, 255, 0.4),
                  0 0 40px rgba(0, 255, 255, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.15);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .title {
      text-align: center;
      margin-bottom: 10px;
      font-size: 26px;
      font-weight: bold;
      text-shadow: 0 0 8px #ff00ff;
    }

    .title span:nth-child(1) { color: #ffea00; }
    .title span:nth-child(2) { color: #00ffea; }
    .title span:nth-child(3) { color: #ff00ff; }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #ccccff;
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #ffea00;
    }

    input {
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #050010;
      color: #ffffff;
      margin-bottom: 12px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #00ffea;
      box-shadow: 0 0 8px rgba(0, 255, 234, 0.6);
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      margin-top: 4px;
      background: linear-gradient(90deg, #ffea00, #ff00ff);
      color: #000010;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.7);
      box-shadow: 0 0 12px rgba(255, 0, 255, 0.7);
    }

    .btn:hover {
      filter: brightness(1.1);
    }

    .link {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
    }

    .link a {
      color: #00ffea;
      text-decoration: none;
      font-weight: bold;
    }

    .link a:hover {
      color: #ffea00;
    }

    .error {
      margin-top: 8px;
      font-size: 12px;
      color: #ff5555;
      text-align: center;
    }

    .success {
      margin-top: 8px;
      font-size: 12px;
      color: #00ff88;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">
      <span>NORMAN</span> <span>CASINO</span> <span>SIGN UP</span>
    </div>

    <div class="subtitle">
      Create your account and keep your <span style="color:#ffea00;">balance</span> safe.
    </div>

    <form id="signupForm">
      <label for="email">EMAIL</label>
      <input type="email" id="email" required placeholder="you@example.com" />

      <label for="password">PASSWORD</label>
      <input type="password" id="password" required placeholder="••••••••" />

      <button type="submit" class="btn">CREATE ACCOUNT</button>
    </form>

    <div id="message" class="error" style="display:none;"></div>

    <div class="link">
      Already have an account?
      <a href="login.html">LOGIN</a>
    </div>
  </div>

  <script>
    const signupForm = document.getElementById('signupForm');
    const message = document.getElementById('message');

    signupForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      handleSignup(email, password, message);
    });
  </script>

  <script type="module" src="scripts/auth.js"></script>
</body>
</html>
