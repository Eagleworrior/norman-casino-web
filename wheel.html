<!DOCTYPE html>
<html lang="en">
<head>
<title>Neon Turbo Wheel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ff00ff, #000020 60%, #000000);
    color: white;
    text-align: center;
    padding: 20px;
    animation: fadeIn 1s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  h1 {
    font-size: 38px;
    margin-top: 10px;
    text-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffea;
    font-weight: bold;
  }
  h1 span:nth-child(1) { color: #ffea00; }
  h1 span:nth-child(2) { color: #00ffea; }
  h1 span:nth-child(3) { color: #ff00ff; }

  #mode {
    margin-top: 15px;
    padding: 10px 15px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #000010;
    color: #00ffea;
    box-shadow: 0 0 12px #00ffea;
  }

  .balance-box {
    margin-top: 15px;
    font-size: 26px;
    font-weight: bold;
    color: #ffea00;
    text-shadow: 0 0 12px #ffea00;
  }

  /* ARROW POINTING DOWN */
  #arrow {
    width: 0;
    height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-top: 60px solid #ffea00; /* down */
    margin: 0 auto;
    margin-bottom: -10px;
    filter: drop-shadow(0 0 10px #ffea00)
            drop-shadow(0 0 20px #ff00ff);
  }

  #wheel-container {
    position: relative;
    width: 420px;
    height: 420px;
    margin: 30px auto;
  }

  #wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background-image: url("https://copilot.microsoft.com/th/id/BCO.c08645b9-c697-48be-a151-2ccb22b5047a.png");
    background-size: cover;
    background-position: center;
    transition: transform 3s cubic-bezier(.1,.8,.2,1.1);
    box-shadow: 0 0 35px #ff00ff, 0 0 45px #00ffea;
  }

  .spin-btn {
    padding: 15px 25px;
    font-size: 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    box-shadow: 0 0 20px #ff00ff;
    transition: 0.2s;
  }

  .spin-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
  }

  #result {
    margin-top: 20px;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 0 12px #ffea00;
  }

  .back-btn {
    margin-top: 25px;
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #00ffea, #ff00ff);
    color: #000010;
    box-shadow: 0 0 15px #ff00ff;
    transition: 0.2s;
  }

  .back-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.15);
  }
</style>
</head>

<body>

<h1>
  <span>NEON</span> <span>CASINO</span> <span>WHEEL</span>
</h1>

<select id="mode" onchange="updateBalanceDisplay()">
  <option value="demo">Demo Mode</option>
  <option value="real">Real Mode</option>
</select>

<div class="balance-box">
  Balance: <span id="balance">0</span>
</div>

<div id="arrow"></div>

<div id="wheel-container">
  <div id="wheel"></div>
</div>

<button class="spin-btn" onclick="spin()">SPIN (Cost: 20)</button>

<p id="result"></p>

<button class="back-btn" onclick="location.href='index.html'">⬅ Back to Menu</button>

<!-- FIREBASE SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDsK3umDd8f2ujLAjIZkv10mtvFNkCs2fA",
  authDomain: "norman-casino.firebaseapp.com",
  projectId: "norman-casino",
  storageBucket: "norman-casino.firebasestorage.app",
  messagingSenderId: "727231313437",
  appId: "1:727231313437:web:f0e60b94cf8f97cb30f8f4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

<!-- CONFETTI -->
<script>
function launchConfetti() {
  const duration = 1500;
  const end = Date.now() + duration;

  (function frame() {
    const colors = ["#ff00ff", "#00ffea", "#ffea00", "#ffffff"];
    const particle = document.createElement("div");

    particle.style.position = "fixed";
    particle.style.width = "10px";
    particle.style.height = "10px";
    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    particle.style.top = Math.random() * window.innerHeight + "px";
    particle.style.left = Math.random() * window.innerWidth + "px";
    particle.style.opacity = "0.9";
    particle.style.borderRadius = "50%";
    particle.style.boxShadow = "0 0 10px white";
    particle.style.zIndex = "9999";
    particle.style.transition = "transform 1s ease-out, opacity 1s ease-out";

    document.body.appendChild(particle);

    setTimeout(() => {
      particle.style.transform = "translateY(200px) rotate(720deg)";
      particle.style.opacity = "0";
    }, 10);

    setTimeout(() => particle.remove(), 1200);

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}
</script>

<script>
let demoBalance = 10000;
let realBalance = 0;
let currentUser = null;

/* wheel values – 14 segments */
const values = [0,5,10,15,20,25,30,35,40,45,50,5,10,20];
const sliceCount = values.length;
const sliceAngle = 360 / sliceCount;
let currentRotation = 0;

/* FIRESTORE BALANCE HELPERS */
async function getRealBalance() {
  if (!currentUser) return 0;
  const docRef = db.collection("users").doc(currentUser.uid);
  const snap = await docRef.get();
  if (!snap.exists) {
    await docRef.set({ balance: 0 });
    return 0;
  }
  return snap.data().balance || 0;
}

async function setRealBalance(amount) {
  if (!currentUser) return;
  await db.collection("users").doc(currentUser.uid).set(
    { balance: amount },
    { merge: true }
  );
}

/* AUTH STATE */
auth.onAuthStateChanged(async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  currentUser = user;
  realBalance = await getRealBalance();
  updateBalanceDisplay();
});

/* UPDATE BALANCE DISPLAY */
function updateBalanceDisplay() {
  const mode = document.getElementById("mode").value;
  const balSpan = document.getElementById("balance");
  if (mode === "demo") {
    balSpan.textContent = demoBalance;
  } else {
    balSpan.textContent = realBalance;
  }
}

/* SPIN WHEEL */
async function spin() {
  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  if (mode === "demo") {
    if (demoBalance < 20) {
      result.textContent = "Not enough demo credits.";
      return;
    }
    demoBalance -= 20;
  } else {
    realBalance = await getRealBalance();
    if (realBalance < 20) {
      result.textContent = "You must deposit first!";
      return;
    }
    realBalance -= 20;
    await setRealBalance(realBalance);
  }

  updateBalanceDisplay();
  result.textContent = "🎡 Spinning...";

  const wheel = document.getElementById("wheel");

  const fullRotations = Math.floor(Math.random() * 5) + 5;
  const extra = Math.floor(Math.random() * 360);
  const rotation = fullRotations * 360 + extra;

  currentRotation += rotation;
  wheel.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(async () => {
    let final = currentRotation % 360;
    if (final < 0) final += 360;

    // arrow points DOWN, so use this mapping
    const pointerAngle = (final + sliceAngle / 2) % 360;
    const index = Math.floor(pointerAngle / sliceAngle);
    const win = values[index];

    if (win > 0) {
      result.textContent = "💎 You won: " + win + " credits!";
      launchConfetti();

      if (mode === "demo") {
        demoBalance += win;
      } else {
        realBalance += win;
        await setRealBalance(realBalance);
      }
    } else {
      result.textContent = "No win, try again!";
    }

    updateBalanceDisplay();
  }, 3100);
}
</script>

</body>
</html>
