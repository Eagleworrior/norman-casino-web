<!DOCTYPE html>
<html lang="en">
<head>
<title>Neon Turbo Wheel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ff00ff, #000020 60%, #000000);
    color: white;
    text-align: center;
    padding: 20px;
    animation: fadeIn 1s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  h1 {
    font-size: 38px;
    margin-top: 10px;
    text-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffea;
    font-weight: bold;
  }

  h1 span:nth-child(1) { color: #ffea00; }
  h1 span:nth-child(2) { color: #00ffea; }
  h1 span:nth-child(3) { color: #ff00ff; }

  #mode {
    margin-top: 15px;
    padding: 10px 15px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #000010;
    color: #00ffea;
    box-shadow: 0 0 12px #00ffea;
  }

  .balance-box {
    margin-top: 15px;
    font-size: 26px;
    font-weight: bold;
    color: #ffea00;
    text-shadow: 0 0 12px #ffea00;
  }

  /* WHEEL CONTAINER */
  #wheel-container {
    position: relative;
    width: 420px;
    height: 420px;
    margin: 30px auto;
  }

  /* WHEEL IMAGE */
  #wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background-image: url("https://i.imgur.com/2yQ2YQw.png"); /* High graphic wheel */
    background-size: cover;
    background-position: center;
    transition: transform 3s cubic-bezier(.1,.8,.2,1.1);
    box-shadow: 0 0 35px #ff00ff, 0 0 45px #00ffea;
  }

  /* REAL ARROW */
  #arrow {
    width: 0;
    height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 60px solid #ffea00;
    margin: 0 auto;
    margin-bottom: -20px;
    filter: drop-shadow(0 0 10px #ffea00)
            drop-shadow(0 0 20px #ff00ff);
    animation: arrowGlow 1.5s infinite ease-in-out;
  }

  @keyframes arrowGlow {
    0% { filter: drop-shadow(0 0 10px #ffea00); }
    50% { filter: drop-shadow(0 0 25px #ff00ff); }
    100% { filter: drop-shadow(0 0 10px #ffea00); }
  }

  /* SPIN BUTTON */
  .spin-btn {
    padding: 15px 25px;
    font-size: 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00ff, #00ffea);
    color: #000010;
    box-shadow: 0 0 20px #ff00ff;
    transition: 0.2s;
  }

  .spin-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
  }

  #result {
    margin-top: 20px;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 12px #ffea00;
  }

  .back-btn {
    margin-top: 25px;
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, #00ffea, #ff00ff);
    color: #000010;
    box-shadow: 0 0 15px #ff00ff;
    transition: 0.2s;
  }

  .back-btn:hover {
    transform: scale(1.05);
    filter: brightness(1.15);
  }
</style>
</head>

<body>

<h1>
  <span>NEON</span> <span>CASINO</span> <span>WHEEL</span>
</h1>

<select id="mode" onchange="updateBalanceDisplay()">
  <option value="demo">Demo Mode</option>
  <option value="real">Real Mode</option>
</select>

<div class="balance-box">
  Balance: <span id="balance">10000</span>
</div>

<div id="arrow"></div>

<div id="wheel-container">
  <div id="wheel"></div>
</div>

<button class="spin-btn" onclick="spin()">SPIN (Cost: 20)</button>

<p id="result"></p>

<button class="back-btn" onclick="location.href='index.html'">⬅ Back to Menu</button>

<script>
let demoBalance = 10000;
let realBalance = 0;

const sliceCount = 37;
const sliceAngle = 360 / sliceCount;
let currentRotation = 0;

function updateBalanceDisplay() {
  const mode = document.getElementById("mode").value;
  document.getElementById("balance").textContent =
    mode === "demo" ? demoBalance : realBalance;
}

function spin() {
  const mode = document.getElementById("mode").value;
  const result = document.getElementById("result");

  let balance = mode === "demo" ? demoBalance : realBalance;

  if (balance < 20) {
    if (mode === "real") {
      result.textContent = "You must deposit first!";
      setTimeout(() => location.href = "deposit.html", 1000);
    } else {
      result.textContent = "Not enough demo credits.";
    }
    return;
  }

  if (mode === "demo") demoBalance -= 20;
  else realBalance -= 20;

  updateBalanceDisplay();
  result.textContent = "🎡 Spinning...";

  const wheel = document.getElementById("wheel");

  const fullRotations = Math.floor(Math.random() * 5) + 5;
  const extra = Math.floor(Math.random() * 360);
  const rotation = fullRotations * 360 + extra;

  currentRotation += rotation;
  wheel.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(() => {
    let final = currentRotation % 360;
    if (final < 0) final += 360;

    let pointerAngle = (360 - final + 180) % 360;
    let index = Math.floor(pointerAngle / sliceAngle);

    let winningNumber = index;

    result.textContent = "💎 You won: " + winningNumber + " credits!";

    if (mode === "demo") demoBalance += winningNumber;
    else realBalance += winningNumber;

    updateBalanceDisplay();
  }, 3100);
}

updateBalanceDisplay();
</script>

</body>
</html>
